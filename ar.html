<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WebAR Sơ cấp cứu</title>

<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
body{
    margin:0;
    overflow:hidden;
}

#home{
    position:fixed;
    top:20px;
    left:20px;
    z-index:999;
    padding:10px 20px;
    font-size:18px;
}
</style>

</head>

<body>

<button id="home" onclick="location.href='index.html'">
🏠 Trang chủ
</button>

<a-scene
mindar-image="imageTargetSrc: targets.mind;"
color-space="sRGB"
embedded
vr-mode-ui="enabled:false"
device-orientation-permission-ui="enabled:true"
>

<a-assets>

<img id="burnImg" src="images/burn.png">

<img id="bleedingImg" src="images/bleeding.png">

<img id="chokingImg" src="images/choking.png">

</a-assets>

<a-camera
position="0 0 0"
look-controls="false">
</a-camera>

<!-- Bỏng -->
<a-entity mindar-image-target="targetIndex:0">
    <a-plane
        src="#burnImg"
        width="1"
        height="1">
    </a-plane>
</a-entity>

<!-- Chảy máu -->
<a-entity mindar-image-target="targetIndex:1">
    <a-plane
        src="#bleedingImg"
        width="1"
        height="1">
    </a-plane>
</a-entity>

<!-- Hóc dị vật -->
<a-entity mindar-image-target="targetIndex:2">
    <a-plane
        src="#chokingImg"
        width="1"
        height="1">
    </a-plane>
</a-entity>

</a-scene>

</body>
</html>
